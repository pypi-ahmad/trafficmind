name: trafficmind-ci

on:
  push:
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install system dependencies
        run: sudo apt-get install -y libgl1 libglib2.0-0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.lock
          python -m pip install --no-deps -e .

      - name: Render dev env
        run: python infra/scripts/render_env.py --profile dev --output .env --force

      - name: Run backend checks
        run: python infra/scripts/run_checks.py --suite backend

  frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.lock
          python -m pip install --no-deps -e .

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Render frontend env
        run: python infra/scripts/render_env.py --profile dev --output frontend/.env.local --force

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Run frontend checks
        run: python infra/scripts/run_checks.py --suite frontend