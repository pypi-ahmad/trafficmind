name: trafficmind-ci

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Render dev env
        run: python infra/scripts/render_env.py --profile dev --output .env --force

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,workflow]"

      - name: Run backend checks
        run: python infra/scripts/run_checks.py --suite backend

  frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Render frontend env
        run: python infra/scripts/render_env.py --profile dev --output frontend/.env.local --force

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Run frontend checks
        run: python infra/scripts/run_checks.py --suite frontend