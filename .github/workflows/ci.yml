name: trafficmind-ci

on:
  push:
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install system dependencies
        run: sudo apt-get install -y libgl1 libglib2.0-0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.lock
          python -m pip install --no-deps -e .

      - name: Render dev env
        run: python infra/scripts/render_env.py --profile dev --output .env --force

      - name: Doctor — service readiness checks
        run: |
          python infra/scripts/doctor.py \
            --service api --service workflow --service streams --service frontend \
            --env-file .env

      - name: Lint — ruff on critical paths
        run: |
          python -m ruff check \
            apps/api/app/api/routes/health.py \
            apps/api/app/core/config.py \
            apps/api/app/core/startup.py \
            apps/api/app/main.py \
            apps/api/app/schemas/health.py \
            apps/workflow/app/api/routes/health.py \
            apps/workflow/app/core/config.py \
            apps/workflow/app/core/startup.py \
            apps/workflow/app/main.py \
            infra/scripts/doctor.py \
            infra/scripts/render_env.py \
            infra/scripts/run_checks.py \
            services/integrations/__init__.py \
            services/integrations/adapters.py \
            services/integrations/builders.py \
            services/integrations/local.py \
            services/integrations/schemas.py \
            services/integrations/signals.py \
            services/runtime/__init__.py \
            services/runtime/deployment.py \
            services/streams/__main__.py \
            services/streams/config.py \
            services/streams/startup.py

      - name: Test — pytest backend suite
        run: |
          python -m pytest tests/ -q --tb=short \
            -m "not integration" \
            -k "not test_demo_seed_surfaces_in_camera_and_observability_apis" \
            2>&1 | while IFS= read -r line; do echo "::warning::$line"; done
          exit "${PIPESTATUS[0]}"
        shell: bash

  frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.lock
          python -m pip install --no-deps -e .

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Render frontend env
        run: python infra/scripts/render_env.py --profile dev --output frontend/.env.local --force

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Run frontend checks
        run: python infra/scripts/run_checks.py --suite frontend